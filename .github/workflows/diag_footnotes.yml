name: Fix Footnotes

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fix and commit
        run: |
          python - << 'EOF'
          import re, pathlib

          def fix_file(text):
              lines = text.splitlines()
              result = []
              i = 0
              fn_def = re.compile(r'^\[\^\d+\]:')
              while i < len(lines):
                  line = lines[i]
                  if fn_def.match(line):
                      parts = [line.rstrip()]
                      i += 1
                      while i < len(lines):
                          nxt = lines[i]
                          if nxt == '' or fn_def.match(nxt):
                              break
                          parts.append(nxt.strip())
                          i += 1
                      result.append(' '.join(p for p in parts if p))
                  else:
                      result.append(line)
                      i += 1
              return '\n'.join(result)

          for path in pathlib.Path('.').glob('*.md'):
              if path.name.lower() == 'readme.md':
                  continue
              original = path.read_text(encoding='utf-8')
              fixed = fix_file(original)
              if fixed != original:
                  path.write_text(fixed, encoding='utf-8')
                  print(f"✅ {path.name}: تم الإصلاح")
              else:
                  print(f"➖ {path.name}: لا تغيير")
          EOF

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.md
          git diff --cached --quiet || git commit -m "fix: دمج الحواشي متعددة الأسطر"
          git push